<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Top Up Free Fire Murah</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  max-width: 420px;
  margin: 20px auto;
}

.box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.item {
  background: #334155;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.item:hover {
  background: orange;
}

.selected {
  background: orange !important;
}

button {
  width: 100%;
  padding: 14px;
  background: orange;
  border: none;
  border-radius: 6px;
  color: white;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

.note {
  font-size: 13px;
  color: #cbd5f5;
}
</style>

</head>
<body>

<div class="header">TOP UP FREE FIRE</div>

<div class="container">

  <!-- ID -->
  <div class="box">
    <p>Masukkan ID Free Fire</p>
    <input id="userId" placeholder="Contoh: 123456789">
  </div>

  <!-- Diamond -->
  <div class="box">
    <p>Pilih Nominal Diamond</p>

    <div class="grid">
      <div class="item" onclick="pilih(this,5)">5 💎<br>Rp1.000</div>
      <div class="item" onclick="pilih(this,70)">70 💎<br>Rp10.000</div>
      <div class="item" onclick="pilih(this,140)">140 💎<br>Rp20.000</div>
      <div class="item" onclick="pilih(this,355)">355 💎<br>Rp50.000</div>
    </div>
  </div>

  <!-- Pembayaran -->
  <div class="box">
    <p>Pembayaran</p>
    <h3>OVO: 081321089458</h3>
    <p class="note">Transfer sesuai nominal, lalu kirim bukti via WhatsApp</p>
  </div>

  <!-- Tombol -->
  <button onclick="beli()">Beli Sekarang</button>

  <p id="status"></p>

</div>

<script>
let diamond = 0;

function pilih(el, d) {
  diamond = d;

  // reset semua pilihan
  let items = document.querySelectorAll(".item");
  items.forEach(i => i.classList.remove("selected"));

  // tandai yang dipilih
  el.classList.add("selected");
}

function beli() {
  let id = document.getElementById("userId").value;

  if (id === "" || diamond === 0) {
    alert("Isi ID dan pilih diamond dulu!");
    return;
  }

  document.getElementById("status").innerText =
    "Silakan transfer, lalu kirim bukti ke WhatsApp...";

  // buka whatsapp
  window.open("https://wa.me/6281321089458?text=Halo%20saya%20mau%20topup%20FF%20ID%20" + id + "%20sebanyak%20" + diamond + "%20diamond");
}
</script>

</body>
</html>
